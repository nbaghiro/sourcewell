name: ci
on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sourcewell
          POSTGRES_PASSWORD: sourcewell
          POSTGRES_DB: sourcewell
        ports:
          - 8902:5432
        options: >-
          --health-cmd "pg_isready -U sourcewell"
          --health-interval 5s --health-timeout 3s --health-retries 15
    env:
      DATABASE_URL: postgresql+asyncpg://sourcewell:sourcewell@localhost:8902/sourcewell
      TEST_DATABASE_URL: postgresql+asyncpg://sourcewell:sourcewell@localhost:8902/sourcewell_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: create test database
        run: PGPASSWORD=sourcewell psql -h localhost -p 8902 -U sourcewell -d sourcewell -c "CREATE DATABASE sourcewell_test;"
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app tests
      - run: uv run pytest -q
