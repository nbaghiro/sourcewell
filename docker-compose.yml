# Local dev infra — host ports use the 89xx band (containers keep standard ports internally).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sourcewell
      POSTGRES_PASSWORD: sourcewell
      POSTGRES_DB: sourcewell
    ports:
      - "8902:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/local/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcewell -d sourcewell"]
      interval: 5s
      timeout: 3s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8904:8025"   # web UI
      - "8905:1025"   # SMTP

volumes:
  pgdata:
